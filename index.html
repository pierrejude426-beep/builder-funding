.empty{color:var(--faint);padding:18px 0;font-size:13px}</style></head><body><div class="hdr"><div class="brand"><span class="mark">B</span><span class="nm" id="bizname"></span><span class="sep"></span><span class="ttl">Funding Operations</span></div><div class="hright"><span class="scope">Las Vegas, NV</span><span class="live"><span class="pres"></span>live · <span id="sub"></span></span></div></div><div class="wrap"><div class="biz" id="biz"></div><div class="stats" id="stats"></div><div class="approve" id="approve" style="display:none"></div><div id="pipe"></div><div class="runs" id="runs"></div></div><div class="scrim" id="scrim"></div><div class="drawer" id="draw"></div><script id="bf-data" type="application/json">{"biz":{"id":"95499e4e-45a7-4d83-aa54-62ab0be1374d","name":"Phare AI","one_liner":"Agentic operations systems that help organizations adopt AI — grant automation for nonprofits and funding operations for early-stage builders.","website":"phare.work","location":"Las Vegas, NV","state":"NV","vertical":"AI / SaaS","stage":"bootstrapped / pre-seed","founded_months":12,"team_size":3,"technical_count":2,"raised_usd":null,"eng_wages_est":200000,"ownership":"foreign_owned","ownership_confirmed":true,"profile":{"ip":"Proprietary multi-agent architecture, eligibility-reasoning, and prompt systems","note":"Profile values are estimates — edit on the business record","tech":"Multi-agent orchestration on n8n + Supabase + Vercel with Anthropic, OpenAI, and Perplexity models","founders":"Solo technical founder; foreign national; 100% owner","traction":"Live deployments: ICF grant automation system, hospitality + dental voice concierge agents","rd_summary":"Novel multi-agent orchestration, retrieval, and automated eligibility-reasoning research conducted in the US","differentiators":"Clients own the delivered systems outright; Phare retains methods and architecture"},"created_at":"2026-06-15T01:10:25.285272+00:00"},"opps":[{"id":1,"business_id":"95499e4e-45a7-4d83-aa5 5499e4e-45a7-4d83-aa54-62ab0be1374d","program_id":"innovatenv_sage","title":"InnovateNV / SAGE (SBIR support)","funder":"State of Nevada","kind":"support","amount":null,"recurring":false,"deadline":null,"url":null,"status":"ineligible","eligible":"ineligible","gate_reason":"Pathway program for SBIR/STTR, which are themselves citizenship-gated.","fit_score":null,"win_score":null,"requirements":{},"rationale":"Support/grant-writing, not direct money; routes to gated federal programs.","created_at":"2026-06-15T01:10:25.285272+00:00"},{"id":6,"business_id":"95499e4e-45a7-4d83-aa54-62ab0be1374d","program_id":"set_aside_certs","title":"SBA Set-Aside Certifications (8(a)/WOSB/HUBZone)","funder":"SBA","kind":"set_aside","amount":null,"recurring":false,"deadline":null,"url":null,"status":"ineligible","eligible":"ineligible","gate_reason":"Certifications require US citizenship of the qualifying owners.","fit_score":null,"win_score":null,"requirements":{},"rationale":"Unlocks set-aside contracting, not a direct grant.","created_at":"2026-06-15T01:10:25.285272+00:00"}],"apps":[{"opportunity_id":7,"status":"strategized","draft":"Phare AI develops agentic operations systems that help organizations adopt AI through automated grant writing for nonprofits and funding operations for early-stage builders. Based in Las Vegas, our proprietary multi-agent architecture represents novel research in AI orchestration, eligibility reasoning, and automated decision-making systems. We seek Nevada Knowledge Fund support to advance our core research in multi-agent coordination and automated eligibility assessment while commercializing systems that benefit Nevada's nonprofit and entrepreneurial ecosystem.\n\nOur core research focuses on three breakthrough areas: (1) Multi-agent orchestration systems that coordinate specialized AI agents for complex workflows, (2) Automated eligibility-reasoning engines that interpret policy documents and match opportunities to organizational profiles, and (3) Adaptive prompt systems that maintain context across multi-step processes. This research addresses fundamental challenges in AI agent coordination, automated reasoning about complex regulatory frameworks, and maintaining coherent AI behavior in long-running processes. Our proprietary architecture built on n8n orchestration with Supabase data layer represents novel approaches to multi-agent system design.\n\nWe have successfully deployed live systems including an ICF grant automation platform and voice concierge agents for hospitality and dental practices. Our unique business model allows clients to own delivered systems outright while we retain underlying methods and architecture, enabling rapid deployment and customization. Current focus areas include grant automation for Nevada nonprofits and funding operations support for early-stage companies, directly benefiting the state's innovation ecosystem.\n\nAs a Las Vegas-based company, we are committed to strengthening Nevada's position in AI innovation. Our grant automation systems will directly benefit Nevada nonprofits by increasing their funding success rates and operational efficiency. Our funding operations tools support the state's growing startup ecosystem by streamlining capital-raising processes. We plan to expand our Nevada team and establish partnerships with UNLV's engineering programs to create research collaboration opportunities and internship pathways for Nevada students.\n\nOur research methodology combines theoretical advances in multi-agent systems with practical implementation using Anthropic, OpenAI, and Perplexity models. We conduct controlled experiments on agent coordination protocols, develop novel retrieval-augmented generation approaches for policy interpretation, and create adaptive systems that learn from deployment feedback. Our process involves iterative development with live client deployments providing real-world validation of our research hypotheses.\n\nPhase 1 (Months 1-3): Enhanced multi-agent coordination research and prototype development. Phase 2 (Months 4-6): Pilot deployments with Nevada nonprofits and startups. Phase 3 (Months 7-9): System optimization based on deployment feedback. Phase 4 (Months 10-12): Documentation of research findings and preparation for scaling across Nevada organizations.","win_strategy":{"verdict":"This application lacks the technical rigor, commercialization clarity, and Nevada-specific economic impact that state innovation funds typically require.","key_moves":["Verify foreign ownership eligibility and consider Nevada partnership structure","Quantify all business metrics and provide concrete Nevada job creation commitments","Replace generic AI buzzwords with specific technical achievements and measurable research goals"],"win_score":25,"weak_spots":[{"fix":"Research program eligibility requirements and consider partnership structure with Nevada entity","issue":"Foreign ownership may disqualify from state economic development funding"},{"fix":"Include revenue figures from deployments, customer acquisition costs, and 12-month financial projections","issue":"No quantified business metrics or financial projections"},{"fix":"Provide specific technical metrics, performance comparisons, and peer review or patent applications","issue":"Vague technical claims without validation or benchmarking"},{"fix":"Commit to specific Nevada hires, salary ranges, and concrete UNLV collaboration agreements","issue":"Weak Nevada economic impact case"}],"scoring_criteria":[{"strength":2,"criterion":"Technical innovation and IP development","how_we_meet":"Claims proprietary multi-agent architecture but provides no technical details, metrics, or validation of novelty"},{"strength":2,"criterion":"Commercialization potential and market validation","how_we_meet":"Mentions live deployments but no revenue figures, customer metrics, or market size analysis"},{"strength":1,"criterion":"Nevada economic impact and job creation","how_we_meet":"Vague promises to expand Nevada team and UNLV partnerships without specific commitments or hiring plans"},{"strength":2,"criterion":"Research methodology and measurable outcomes","how_we_meet":"Generic research phases without specific metrics, benchmarks, or success criteria"},{"strength":2,"criterion":"Competitive advantage and differentiation","how_we_meet":"Business model differentiation mentioned but no competitive analysis or technical superiority evidence"}],"evidence_to_gather":["Revenue and usage metrics from ICF and hospitality deployments","Technical benchmarks comparing multi-agent performance to existing solutions","Letters of intent from Nevada nonprofits or startups for pilot programs","UNLV faculty collaboration agreements or research partnership MOUs","Competitive analysis showing technical superiority over existing grant automation tools"]},"win_score":25},{"opportunity_id":1,"status":"strategized","draft":"Phare AI conducts qualifying research under Section 41 of the Internal Revenue Code through systematic development of agentic operations systems that help organizations adopt AI solutions.\n\nPERMITTED PURPOSE: Our research activities create new business components in the form of proprietary multi-agent orchestration technologies, automated eligibility-reasoning systems, and advanced prompt engineering frameworks. This research directly supports development of AI solutions for grant automation and funding operations, advancing the state of artificial intelligence applications in operational environments.\n\nTECHNOLOGICAL IN NATURE: The research fundamentally relies on computer science, artificial intelligence, and distributed systems engineering principles. Core technological elements include: (1) Multi-agent orchestration architecture coordinating multiple AI models (Anthropic, OpenAI, Perplexity) within complex workflows, (2) Novel eligibility-reasoning algorithms that automatically assess qualification criteria across diverse programs, (3) Advanced retrieval systems integrated with n8n, Supabase, and Vercel infrastructure, and (4) Proprietary prompt engineering systems optimizing AI model performance for operational tasks.\n\nELIMINATION OF UNCERTAINTY: Our research addresses significant technical uncertainties in multi-agent AI systems: How to effectively orchestrate multiple large language models without conflicts or redundancies; How to develop reliable eligibility-reasoning that accurately interprets complex, multi-criteria requirements; How to optimize retrieval performance when integrating multiple data sources and AI models in real-time; How to create generalizable prompt systems that maintain performance across diverse operational contexts while preserving reliability.\n\nPROCESS OF EXPERIMENTATION: We employ systematic experimentation including: (1) Iterative architecture testing with controlled deployment of different multi-agent configurations measuring coordination effectiveness, (2) A/B testing of eligibility-reasoning algorithms against known qualification datasets optimizing accuracy, (3) Performance benchmarking of retrieval systems under varying load and complexity scenarios, (4) Prompt engineering experimentation using systematic variation and measurement of output quality and consistency, and (5) Live deployment validation with actual client systems including ICF grant automation and voice concierge agents.\n\nAll research activities are conducted in Las Vegas, Nevada, with systematic documentation, measurable success criteria, and iterative refinement processes that qualify under the federal R&D tax credit provisions.","win_strategy":{"verdict":"Strong technical foundation but needs more specific documentation of experiments, costs, and technical uncertainties to meet IRS standards.","key_moves":["Create comprehensive QRE documentation with time-tracking and cost allocation","Document specific experimental results with quantitative metrics and failure cases","Ensure foreign ownership doesn't
